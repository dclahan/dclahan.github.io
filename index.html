<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Citi Bike Real-Time Monitor</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; }
  #map { width: 100%; height: 100vh; }
  
  .panel {
    position: absolute; top: 12px; left: 12px; z-index: 1000;
    background: rgba(10, 10, 20, 0.92); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
    padding: 16px 20px; min-width: 260px; max-width: 300px;
  }
  .panel h1 { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .panel .subtitle { font-size: 11px; color: #888; margin-bottom: 12px; }
  
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat-card {
    background: rgba(255,255,255,0.04); border-radius: 8px; padding: 10px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .stat-card .label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .value { font-size: 20px; font-weight: 700; color: #fff; margin-top: 2px; }
  .stat-card .delta { font-size: 11px; margin-top: 2px; }
  .delta.pos { color: #4ade80; }
  .delta.neg { color: #f87171; }
  .delta.neutral { color: #666; }

  .legend { margin-top: 8px; }
  .legend-title { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 12px; }
  .legend-circle { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  .controls {
    position: absolute; top: 12px; right: 12px; z-index: 1000;
    background: rgba(10, 10, 20, 0.92); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px;
    padding: 12px 16px;
  }
  .controls label { font-size: 12px; color: #ccc; display: flex; align-items: center; gap: 6px; cursor: pointer; margin-bottom: 6px; }
  .controls select, .controls input[type=range] { 
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    color: #fff; border-radius: 6px; padding: 4px 8px; font-size: 12px; width: 100%;
  }
  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600;
    background: rgba(74, 222, 128, 0.15); color: #4ade80; margin-left: 4px;
  }
  .pill.paused { background: rgba(248, 113, 113, 0.15); color: #f87171; }

  .ticker {
    position: absolute; bottom: 12px; left: 12px; right: 12px; z-index: 1000;
    background: rgba(10, 10, 20, 0.88); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
    padding: 10px 16px; font-size: 12px; color: #aaa;
    max-height: 120px; overflow-y: auto;
  }
  .ticker-title { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .ticker-item { margin-bottom: 3px; line-height: 1.4; }
  .ticker-item .time { color: #666; font-size: 10px; margin-right: 6px; }
  .ticker-item .outflow { color: #f87171; }
  .ticker-item .inflow { color: #4ade80; }

  .station-popup .name { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .station-popup .row { display: flex; justify-content: space-between; font-size: 12px; padding: 2px 0; }
  .station-popup .bar-bg { height: 6px; background: #333; border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .station-popup .bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }

  .loading-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 2000;
    background: #0a0a0f; display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .loading-overlay .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #4ade80;
    border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay .msg { margin-top: 16px; color: #888; font-size: 14px; }
</style>
</head>
<body>

<div id="loading" class="loading-overlay">
  <div class="spinner"></div>
  <div class="msg">Loading station data...</div>
</div>

<div id="map"></div>

<div class="panel" id="panel">
  <h1>Citi Bike Live <span class="pill" id="status-pill">LIVE</span></h1>
  <div class="subtitle" id="last-update">Connecting...</div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="label">Bikes Out</div>
      <div class="value" id="stat-bikes">—</div>
      <div class="delta neutral" id="delta-bikes"></div>
    </div>
    <div class="stat-card">
      <div class="label">Docks Free</div>
      <div class="value" id="stat-docks">—</div>
      <div class="delta neutral" id="delta-docks"></div>
    </div>
    <div class="stat-card">
      <div class="label">Stations</div>
      <div class="value" id="stat-stations">—</div>
      <div class="delta neutral" id="delta-active"></div>
    </div>
    <div class="stat-card">
      <div class="label">E-Bikes</div>
      <div class="value" id="stat-ebikes">—</div>
      <div class="delta neutral" id="delta-ebikes"></div>
    </div>
  </div>
  <div class="legend">
    <div class="legend-title">Fill Rate</div>
    <div class="legend-row"><div class="legend-circle" style="background:#f87171"></div> Nearly full (few docks)</div>
    <div class="legend-row"><div class="legend-circle" style="background:#fbbf24"></div> Moderate</div>
    <div class="legend-row"><div class="legend-circle" style="background:#4ade80"></div> Plenty of docks</div>
    <div class="legend-row"><div class="legend-circle" style="background:#555"></div> Empty / inactive</div>
  </div>
</div>

<div class="controls">
  <label>Color by
    <select id="color-mode">
      <option value="fill">Fill rate (bikes/capacity)</option>
      <option value="ebike">E-bike ratio</option>
      <option value="delta">Recent change (±bikes)</option>
    </select>
  </label>
  <label>Size by
    <select id="size-mode">
      <option value="capacity">Station capacity</option>
      <option value="bikes">Bikes available</option>
      <option value="docks">Docks available</option>
    </select>
  </label>
  <label style="margin-top:8px">
    Poll interval: <span id="interval-label">60s</span>
    <input type="range" id="interval-slider" min="15" max="120" step="15" value="60">
  </label>
</div>

<div class="ticker" id="ticker">
  <div class="ticker-title">Activity Feed (inferred from deltas)</div>
  <div id="ticker-items">Waiting for first poll cycle...</div>
</div>

<script>
const STATUS_URL = "https://gbfs.lyft.com/gbfs/2.3/bkn/en/station_status.json";
const INFO_URL = "https://gbfs.lyft.com/gbfs/2.3/bkn/en/station_information.json";

let map, stationInfo = {}, prevStatus = {}, markers = {}, tickerEvents = [];
let pollInterval = 60000, pollTimer = null, pollCount = 0;

// ── Map Setup ──
function initMap() {
  map = L.map('map', {
    center: [40.735, -73.97],
    zoom: 13,
    zoomControl: false,
    attributionControl: false
  });
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19
  }).addTo(map);
}

// ── Color Helpers ──
function fillColor(ratio) {
  if (ratio > 0.8) return '#f87171';
  if (ratio > 0.5) return '#fbbf24';
  if (ratio > 0) return '#4ade80';
  return '#555';
}

function deltaColor(d) {
  if (d > 0) return '#4ade80';
  if (d < 0) return '#f87171';
  return '#555';
}

function ebikeColor(ratio) {
  if (ratio > 0.5) return '#818cf8';
  if (ratio > 0.2) return '#60a5fa';
  if (ratio > 0) return '#4ade80';
  return '#555';
}

function getColor(station) {
  const mode = document.getElementById('color-mode').value;
  const cap = stationInfo[station.station_id]?.capacity || 1;
  const bikes = station.num_bikes_available || 0;
  const fillRatio = bikes / cap;

  if (mode === 'fill') return fillColor(fillRatio);
  if (mode === 'ebike') {
    const eb = station.num_ebikes_available || 0;
    return ebikeColor(bikes > 0 ? eb / bikes : 0);
  }
  if (mode === 'delta') {
    const prev = prevStatus[station.station_id];
    const delta = prev ? bikes - (prev.num_bikes_available || 0) : 0;
    return deltaColor(delta);
  }
  return '#4ade80';
}

function getRadius(station) {
  const mode = document.getElementById('size-mode').value;
  const cap = stationInfo[station.station_id]?.capacity || 20;
  let val;
  if (mode === 'capacity') val = cap;
  else if (mode === 'bikes') val = station.num_bikes_available || 0;
  else val = station.num_docks_available || 0;
  return Math.max(3, Math.sqrt(val) * 1.8);
}

// ── Data Fetching ──
async function fetchInfo() {
  const r = await fetch(INFO_URL);
  const d = await r.json();
  d.data.stations.forEach(s => { stationInfo[s.station_id] = s; });
}

async function fetchStatus() {
  const r = await fetch(STATUS_URL);
  const d = await r.json();
  return d.data.stations;
}

// ── Render / Update ──
function updateMarkers(stations) {
  let totalBikes = 0, totalDocks = 0, totalEbikes = 0, activeCount = 0;
  let prevTotalBikes = 0, prevTotalDocks = 0, prevTotalEbikes = 0, prevActive = 0;
  const newEvents = [];

  stations.forEach(s => {
    const info = stationInfo[s.station_id];
    if (!info) return;
    const bikes = s.num_bikes_available || 0;
    const docks = s.num_docks_available || 0;
    const ebikes = s.num_ebikes_available || 0;
    const active = s.is_installed && s.is_renting;

    totalBikes += bikes;
    totalDocks += docks;
    totalEbikes += ebikes;
    if (active) activeCount++;

    // Compute deltas
    const prev = prevStatus[s.station_id];
    if (prev) {
      prevTotalBikes += prev.num_bikes_available || 0;
      prevTotalDocks += prev.num_docks_available || 0;
      prevTotalEbikes += prev.num_ebikes_available || 0;
      if (prev.is_installed && prev.is_renting) prevActive++;

      const db = bikes - (prev.num_bikes_available || 0);
      if (Math.abs(db) >= 1 && info.name) {
        newEvents.push({ name: info.name, delta: db, time: new Date() });
      }
    }

    const color = getColor(s);
    const radius = getRadius(s);

    if (markers[s.station_id]) {
      markers[s.station_id].setStyle({ fillColor: color, color: color, radius: radius });
    } else {
      const m = L.circleMarker([info.lat, info.lon], {
        radius: radius, fillColor: color, color: color,
        weight: 1, opacity: 0.8, fillOpacity: 0.6
      }).addTo(map);
      markers[s.station_id] = m;
    }

    const cap = info.capacity || 1;
    const pct = Math.round((bikes / cap) * 100);
    const barColor = fillColor(bikes / cap);
    markers[s.station_id].bindPopup(
      `<div class="station-popup">
        <div class="name">${info.name}</div>
        <div class="row"><span>Bikes</span><span>${bikes} (${ebikes} e-bike${ebikes !== 1 ? 's' : ''})</span></div>
        <div class="row"><span>Docks free</span><span>${docks}</span></div>
        <div class="row"><span>Capacity</span><span>${cap}</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
      </div>`, { className: 'dark-popup' }
    );
  });

  // Stats
  document.getElementById('stat-bikes').textContent = totalBikes.toLocaleString();
  document.getElementById('stat-docks').textContent = totalDocks.toLocaleString();
  document.getElementById('stat-stations').textContent = activeCount.toLocaleString();
  document.getElementById('stat-ebikes').textContent = totalEbikes.toLocaleString();

  if (pollCount > 1) {
    setDelta('delta-bikes', totalBikes - prevTotalBikes);
    setDelta('delta-docks', totalDocks - prevTotalDocks);
    setDelta('delta-active', activeCount - prevActive);
    setDelta('delta-ebikes', totalEbikes - prevTotalEbikes);
  }

  // Ticker
  if (newEvents.length > 0) {
    tickerEvents = [...newEvents.slice(0, 20), ...tickerEvents].slice(0, 50);
    renderTicker();
  }

  // Save for next diff
  prevStatus = {};
  stations.forEach(s => { prevStatus[s.station_id] = { ...s }; });
  pollCount++;
}

function setDelta(id, val) {
  const el = document.getElementById(id);
  if (val > 0) { el.textContent = `+${val}`; el.className = 'delta pos'; }
  else if (val < 0) { el.textContent = `${val}`; el.className = 'delta neg'; }
  else { el.textContent = '—'; el.className = 'delta neutral'; }
}

function renderTicker() {
  const container = document.getElementById('ticker-items');
  container.innerHTML = tickerEvents.map(e => {
    const t = e.time.toLocaleTimeString();
    const cls = e.delta > 0 ? 'inflow' : 'outflow';
    const sign = e.delta > 0 ? '+' : '';
    const verb = e.delta > 0 ? 'gained' : 'lost';
    return `<div class="ticker-item"><span class="time">${t}</span><span class="${cls}">${e.name}</span> ${verb} <span class="${cls}">${sign}${e.delta}</span> bike${Math.abs(e.delta) !== 1 ? 's' : ''}</div>`;
  }).join('');
}

// ── Poll Loop ──
async function poll() {
  try {
    const stations = await fetchStatus();
    updateMarkers(stations);
    const now = new Date().toLocaleTimeString();
    document.getElementById('last-update').textContent = `Updated ${now} · Poll #${pollCount} · ${Object.keys(stationInfo).length} stations`;
    document.getElementById('status-pill').textContent = 'LIVE';
    document.getElementById('status-pill').className = 'pill';
  } catch (err) {
    console.error('Poll error:', err);
    document.getElementById('status-pill').textContent = 'ERROR';
    document.getElementById('status-pill').className = 'pill paused';
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  poll();
  pollTimer = setInterval(poll, pollInterval);
}

// ── Init ──
async function init() {
  initMap();
  try {
    await fetchInfo();
    await poll();
    document.getElementById('loading').style.display = 'none';
    pollTimer = setInterval(poll, pollInterval);
  } catch (err) {
    document.getElementById('loading').querySelector('.msg').textContent = 'Failed to load data. Check console.';
    console.error(err);
  }
}

// ── Controls ──
document.getElementById('color-mode').addEventListener('change', () => {
  if (pollCount > 0) fetchStatus().then(updateMarkers);
});
document.getElementById('size-mode').addEventListener('change', () => {
  if (pollCount > 0) fetchStatus().then(updateMarkers);
});
document.getElementById('interval-slider').addEventListener('input', (e) => {
  pollInterval = e.target.value * 1000;
  document.getElementById('interval-label').textContent = e.target.value + 's';
  startPolling();
});

init();
</script>
</body>
</html>
